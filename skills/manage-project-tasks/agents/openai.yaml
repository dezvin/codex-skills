interface:
  display_name: "Manage Project Tasks"
  short_description: "Долговременные задачи в TODO и архиве"
  default_prompt: >-
    Use $manage-project-tasks to create, resume, update, block, close, cancel,
    archive, or reconstruct durable project task state without inventing
    evidence, losing open work, or depending on installation location.

policy:
  allow_implicit_invocation: true
